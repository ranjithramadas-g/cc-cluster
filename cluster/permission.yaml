kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: tenant-admin-binding
  namespace: gitops-test-ns
subjects:
- kind: ServiceAccount
  name: ns-reconciler-gitops-test-ns # The service account Config Sync auto-creates
  namespace: config-management-system
roleRef:
  kind: ClusterRole
  name: admin # Grants admin rights ONLY within gitops-test-ns
  apiGroup: rbac.authorization.k8s.io
